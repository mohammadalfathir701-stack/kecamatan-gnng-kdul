        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-8.801382504823874,108.99787372954724],[-7.0210987520235895,111.81040032094408]]);
        var hash = new L.Hash(map);

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var abstract = new L.Control({'position':'topright'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'

                abstract.show();
                return this._div;
            };
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'NAMA   : MOHAMMAD AL FATHIR <br />KELAS   : SPIP - A<br />NIT       : 2502010024';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({

        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OSMStandard_0');

        });
        layer_OSMStandard_0;
        map.addLayer(layer_OSMStandard_0);
        function pop_petagunungkidul_1(feature, layer) {
            var popupContent = '<table>\

                        <td class="visible-with-data" id="WADMKC">' + (feature.properties['WADMKC'] !== null ? autolinker.link(String(feature.properties['WADMKC']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\

                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_petagunungkidul_1_0(feature) {

        map.createPane('pane_petagunungkidul_1');

        map.getPane('pane_petagunungkidul_1').style['mix-blend-mode'] = 'normal';
        var layer_petagunungkidul_1 = new L.geoJson(json_petagunungkidul_1, {

            layerName: 'layer_petagunungkidul_1',
            pane: 'pane_petagunungkidul_1',

        bounds_group.addLayer(layer_petagunungkidul_1);
        map.addLayer(layer_petagunungkidul_1);
        var overlaysTree = [
            {label: 'peta gunung kidul<br /><table><tr><td style="text-align: center;"><img src="legend/petagunungkidul_1_940696130.png" /></td><td>94,06 - 96,13</td></tr><tr><td style="text-align: center;"><img src="legend/petagunungkidul_1_961397141.png" /></td><td>96,13 - 97,14</td></tr><tr><td style="text-align: center;"><img src="legend/petagunungkidul_1_971497842.png" /></td><td>97,14 - 97,84</td></tr><tr><td style="text-align: center;"><img src="legend/petagunungkidul_1_978498623.png" /></td><td>97,84 - 98,62</td></tr><tr><td style="text-align: center;"><img src="legend/petagunungkidul_1_9862100364.png" /></td><td>98,62 - 100,36</td></tr></table>', layer: layer_petagunungkidul_1},
            {label: "OSM Standard", layer: layer_OSMStandard_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,

            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>
